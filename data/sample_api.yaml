openapi: "3.0.3"

info:
  title: "User Management API"
  description: "A sample REST API for managing users and their bank accounts."
  version: "1.0.0"

servers:
  - url: "https://api.example.com/v1"
    description: "Production server"

paths:
  /users:
    get:
      operationId: listUsers
      summary: "List all users"
      description: "Returns a paginated list of all registered users."
      tags:
        - Users
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination (default: 1)"
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: "Number of results per page (max: 100)"
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: "A list of users"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "400":
          description: "Invalid query parameters"
        "500":
          description: "Internal server error"

    post:
      operationId: createUser
      summary: "Create a new user"
      description: "Registers a new user in the system. Email must be unique."
      tags:
        - Users
      requestBody:
        required: true
        description: "User details to register"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: "User created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: "Validation error (missing fields, invalid email, etc.)"
        "409":
          description: "Email already exists"
        "500":
          description: "Internal server error"

  /users/{userId}:
    get:
      operationId: getUserById
      summary: "Get user by ID"
      description: "Returns full profile details for a specific user."
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: "Unique identifier of the user"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "User found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: "User not found"
        "500":
          description: "Internal server error"

    put:
      operationId: updateUser
      summary: "Update user profile"
      description: "Updates profile fields for an existing user. Email cannot be changed."
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: "Unique identifier of the user"
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: "User updated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: "Validation error"
        "404":
          description: "User not found"
        "500":
          description: "Internal server error"

    delete:
      operationId: deleteUser
      summary: "Delete a user"
      description: "Permanently deletes a user account. This action cannot be undone."
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: "Unique identifier of the user"
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "User deleted successfully (no content)"
        "404":
          description: "User not found"
        "500":
          description: "Internal server error"

  /users/{userId}/accounts:
    get:
      operationId: getUserAccounts
      summary: "Get user bank accounts"
      description: "Returns all bank accounts associated with a user."
      tags:
        - Accounts
      parameters:
        - name: userId
          in: path
          required: true
          description: "Unique identifier of the user"
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "List of accounts"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BankAccount"
        "404":
          description: "User not found"

  /auth/login:
    post:
      operationId: loginUser
      summary: "Authenticate user"
      description: "Validates credentials and returns a JWT token."
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "Login successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                expires_in: 3600
        "401":
          description: "Invalid credentials"
        "429":
          description: "Too many login attempts. Try again later."

components:
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        created_at:
          type: string
          format: date-time
        is_active:
          type: boolean
          default: true

    CreateUserRequest:
      type: object
      required:
        - email
        - name
        - password
      properties:
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: "John Doe"
        password:
          type: string
          minLength: 8
          example: "SecurePass123!"

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100

    BankAccount:
      type: object
      properties:
        account_id:
          type: string
        owner_id:
          type: string
        balance:
          type: number
          format: float
        created_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthToken:
      type: object
      properties:
        token:
          type: string
        expires_in:
          type: integer
          description: "Token validity in seconds"